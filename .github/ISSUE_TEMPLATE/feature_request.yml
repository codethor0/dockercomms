name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        For **security-sensitive** changes, read [SECURITY.md](https://github.com/codethor0/dockercomms/blob/main/SECURITY.md) first.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered, or why the status quo is insufficient.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Protocol constraints, registry behavior, links to SPEC.md sections, etc.
    validations:
      required: false

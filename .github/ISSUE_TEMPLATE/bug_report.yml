name: Bug report
description: Something is broken or incorrect
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        For **security vulnerabilities**, do not use this form. Use [SECURITY.md](https://github.com/codethor0/dockercomms/blob/main/SECURITY.md) and private vulnerability reporting when enabled.
  - type: input
    id: version
    attributes:
      label: Version or tag
      description: Output of `dockercomms version`, or git tag / SHA.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Go version if building from source.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command
      description: The full command line you ran (one or more lines).
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps from a clean state (files, registry, env vars without secrets).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Full error output or logs (redact secrets).
    validations:
      required: true
